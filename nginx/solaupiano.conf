server {
    server_name solaupiano.fr www.solaupiano.fr;

    client_max_body_size 110M;

    location /uploads/ {
        alias /var/www/solaupiano/public/uploads/;
        add_header Access-Control-Allow-Origin *;
        expires 7d;
    }

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/solaupiano.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/solaupiano.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.solaupiano.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = solaupiano.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name solaupiano.fr www.solaupiano.fr;
    return 404; # managed by Certbot
}
