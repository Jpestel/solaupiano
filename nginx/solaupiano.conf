# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name solaupiano.fr www.solaupiano.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name solaupiano.fr www.solaupiano.fr;

    ssl_certificate     /etc/letsencrypt/live/solaupiano.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solaupiano.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Taille max des uploads (backing tracks jusqu'à 100 Mo)
    client_max_body_size 110M;

    # Fichiers statiques Next.js servis directement
    location /_next/static/ {
        alias /var/www/solaupiano/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers uploadés (partitions, audios...)
    location /uploads/ {
        alias /var/www/solaupiano/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon et fichiers publics
    location /favicon.ico {
        alias /var/www/solaupiano/public/favicon.ico;
        expires 30d;
    }

    # Tout le reste → Next.js via PM2
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
